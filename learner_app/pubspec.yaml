name: ikamva_lam
description: Ikamva Lam learner app — offline-first English practice (Gemma + llama.cpp).
homepage: https://www.kaggle.com/competitions/gemma-4-good-hackathon/writeups/ikamva-lam
repository: https://github.com/makhosi6/ikamva_lam.git
publish_to: 'none' 

version: 0.9.8+1

environment:
  sdk: ^3.10.1


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  drift: ^2.32.1
  path: ^1.9.1
  path_provider: ^2.1.5
  crypto: ^3.0.6
  uuid: ^4.5.1
  flutter_tts: ^4.2.0
  http: ^1.2.2
  kokoro_tts_flutter: ^0.2.0+1
  just_audio: ^0.10.5
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  drift_dev: ^2.32.1
  build_runner: ^2.13.1
  flutter_native_splash: ^2.4.7
flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: assets/branding/logo.png
  image_path: assets/branding/logo.png
  adaptive_icon_background: "#FFF6F1E7"
  adaptive_icon_foreground: assets/branding/logo.png
  remove_alpha_ios: true


flutter_native_splash:
  color: "#F6F1E7"
  image: assets/branding/logo.png
  android_12:
    color: "#F6F1E7"
    image: assets/branding/logo.png


flutter:

  uses-material-design: true

  assets:
    - assets/branding/logo.png
    - assets/prompts/prompt_v3/
    - assets/kokoro/kokoro-v1.0.int8.onnx
    - assets/kokoro/voices_bundle.json
    # kokoro_tts_flutter loads these via rootBundle at assets/… (host app paths)
    - assets/tokenizer_vocab.json
    - assets/lexicon.json
    # malsami Lexicon.initialize uses assets/us_*.json (not packages/malsami/…)
    - assets/us_gold.json
    - assets/us_silver.json
    - assets/gb_gold.json
    - assets/gb_silver.json
