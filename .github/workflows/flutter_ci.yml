# Learner app: `flutter_gemma` on Android/iOS; `flutter test` runs without loading real weights
# unless compile-time IKAMVA_MODEL_DOWNLOAD_URL is set. No repo-native/ llama.cpp build steps.
# Optional secrets written to repo-root `.env` for `--dart-define-from-file`:
# `IKAMVA_HF_TOKEN`, `IKAMVA_MODEL_DOWNLOAD_URL` (HTTPS `.task` link for release builds).
name: Flutter CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  analyze-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: learner_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-and-deploy:
    runs-on: macos-latest
    needs: analyze-test
    permissions:
      contents: write
    defaults:
      run:
        working-directory: learner_app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Write repo-root .env for dart-define-from-file
        working-directory: ${{ github.workspace }}
        run: |
          {
            printf 'IKAMVA_HF_TOKEN=%s\n' "${IKAMVA_HF_TOKEN}"
            printf 'IKAMVA_MODEL_DOWNLOAD_URL=%s\n' "${IKAMVA_MODEL_DOWNLOAD_URL}"
          } > .env
        env:
          IKAMVA_HF_TOKEN: ${{ secrets.IKAMVA_HF_TOKEN }}
          IKAMVA_MODEL_DOWNLOAD_URL: ${{ secrets.IKAMVA_MODEL_DOWNLOAD_URL }}
      - run: flutter pub get
      - run: flutter build apk --dart-define-from-file="${{ github.workspace }}/.env"
      - run: flutter build ios --release --no-codesign --dart-define-from-file="${{ github.workspace }}/.env"
      - name: Zip iOS app bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: zip -r build/ios/Runner-ios-release-nocodesign.zip build/ios/iphoneos/Runner.app
      - name: Name release assets with tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/app-release-${{ github.ref_name }}.apk"
          cp build/ios/Runner-ios-release-nocodesign.zip "build/ios/Runner-ios-release-nocodesign-${{ github.ref_name }}.zip"
      - name: Write release notes from commits
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ${{ github.workspace }}
        run: |
          NOTES="${{ github.workspace }}/release-notes.md"
          CURRENT="${{ github.ref_name }}"
          {
            echo "## Commits"
            echo ""
            PREV=$(git tag -l 'v*' --sort=-v:refname | awk -v cur="$CURRENT" 'found { print; exit } $0==cur { found=1 }')
            if [ -n "$PREV" ]; then
              git log "${PREV}..${CURRENT}" --pretty=format:'- %s (%h)'
            else
              git log -100 "${CURRENT}" --pretty=format:'- %s (%h)'
            fi
            echo ""
          } > "$NOTES"
      - name: Upload APK and iOS bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ github.workspace }}/release-notes.md
          generate_release_notes: true
          files: |
            learner_app/build/app/outputs/flutter-apk/app-release-${{ github.ref_name }}.apk
            learner_app/build/ios/Runner-ios-release-nocodesign-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
