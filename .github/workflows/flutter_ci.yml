name: Flutter CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  analyze-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: learner_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-and-deploy:
    runs-on: macos-latest
    needs: analyze-test
    permissions:
      contents: write
    defaults:
      run:
        working-directory: learner_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk
      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: learner_app/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
