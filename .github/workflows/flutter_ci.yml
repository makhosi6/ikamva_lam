name: Flutter CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  analyze-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: learner_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-and-deploy:
    runs-on: macos-latest
    needs: analyze-test
    permissions:
      contents: write
    defaults:
      run:
        working-directory: learner_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk
      - run: flutter build ios --release --no-codesign
      - name: Zip iOS app bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: zip -r build/ios/Runner-ios-release-nocodesign.zip build/ios/iphoneos/Runner.app
      - name: Upload APK and iOS bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            learner_app/build/app/outputs/flutter-apk/app-release.apk
            learner_app/build/ios/Runner-ios-release-nocodesign.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
